<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>New Year Countdown</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: cursive;
        }
        html,
        body{
            width: 100%;
            height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            background-color: slateblue;
        }
        h2{
            color: white;
            text-transform: uppercase;
        }
        .year{
            font-size: 5em;
            color: white;
            font-weight: bold;
        }
        .countdown{
            margin: 30px;
            background-color: rgba(0, 0, 0, 0.1);
            width: 100%;
            color: white;
            height: 120px;
            display: flex;
            justify-content: center;
            align-items: center;
        }
        .countdown div{
            margin: 0 15px;
            font-size: 2.5em;
            font-weight: 500;
            margin-top: -25px;
            position: relative;
            text-align: center;
            width: 100px;
        }
        .countdown div::before{
            content: "";
            position: absolute;
            bottom: -30px;
            left: 0;
            font-size: 0.35em;
            line-height: 35px;
            text-transform: uppercase;
            letter-spacing: 1px;
            font-weight: 500;
            width: 100%;
            height: 35px;
        }
        .countdown #month::before{
            content: "Month";
        }
        .countdown #week::before{
            content: "Week";
        }
        .countdown #day::before{
            content: "Day";
        }
        .countdown #hour::before{
            content: "Hour";
        }
        .countdown #minute::before{
            content: "Minute";
        }
        .countdown #second::before{
            content: "Second";
        }
    </style>
</head>
<body>
    <h2>Count down to new year</h2>
    <div class="year">2026</div>
    <div class="countdown">
        <div id="week">00</div>
        <div id="day">000</div>
        <div id="hour">000</div>
        <div id="minute">000</div>
        <div id="second">000</div>
    </div>
</body>
<script>
    const weekEl = document.getElementById("week")
    const dayEl = document.getElementById("day")
    const hourEl = document.getElementById("hour")
    const minuteEl = document.getElementById("minute")
    const secondEl = document.getElementById("second")
    const yearEl = document.querySelector("year")

    const newYearDate = new Date("Jan 1, 2027 00:00:00").getTime();
    
    UpdateCounter()

    function UpdateCounter() {
        const now = new Date().getTime();
        const gap = newYearDate - now;
        
        const second = 1000;
        const minute = second * 60;
        const hour = minute * 60;
        const day = hour * 24
        const week = day * 7

        const days = Math.floor(gap/day)
        const weeks = Math.floor(gap / week)
        const hours = Math.floor((gap % day) / hour)
        const minutes = Math.floor((gap % hour) / minute)
        const seconds = Math.floor((gap % minute) / second)
        
        dayEl.innerHTML = days
        minuteEl.innerHTML = minutes
        hourEl.innerHTML = hours
        secondEl.innerHTML = seconds
        weekEl.innerHTML = weeks
        setTimeout(UpdateCounter, 1000)
    }
</script>
</html>
