<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Currency Converter </title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: Verdana, Geneva, Tahoma, sans-serif;
        }
        html,
        body {
            width: 100%;
            height: 100vh;
            background-color: yellow;
            display: flex;
            justify-content: center;
            align-items: center;
        }
        .container {
            background-color: darkcyan;
            color: aliceblue;
            padding: 10px;
            border-radius: 5px;
            text-align: center;
        }
        .currency-container {
            padding: 20px;
            display: flex;
            justify-content: space-between;
        }
        .currency-containe, select{
            padding: 10px;
        }
        .currency-containe,input{
            border: none;
            background-color: transparent;
            font-size: 25px;
            text-align: right;
            color: aliceblue;
            outline: none;
        }
        .exchange-rate {
            font-weight: 16px;
            font-weight: 600;
        }
        select:focus,
        input:focus {
            outline: none;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>Currency Converter</h1>
        <div class="currency-container">
            <select id="Currency-first">
                <option value="AUD">AUD</option>
                <option value="CAD">CAD</option>
                <option value="EUR">EUR</option>
                <option value="GBP">GBP</option>
                <option value="INR">INR</option>
                <option value="JPY">JPY</option>
                <option value="USD" selected>USD</option>
            </select>
            <input type="number" id="worth-first" value="1" min="1">
        </div>
        <div class="currency-container">
            <select id="Currency-second">
                <option value="AUD">AUD</option>
                <option value="CAD">CAD</option>
                <option value="EUR">EUR</option>
                <option value="GBP">GBP</option>
                <option value="INR" selected>INR</option>
                <option value="JPY">JPY</option>
                <option value="USD">USD</option>
            </select>
            <input type="number" id="worth-second" disabled>
        </div>
        <p class="exchange-rate" id="exchange-rate">USD = INR</p>
    </div>
</body>
<script>
    const currencyfirstEl = document.getElementById("Currency-first")
    const currencySecondEl = document.getElementById("Currency-second")
    const worthfirstEl = document.getElementById("worth-first")
    const worthsecondEl = document.getElementById("worth-second")
    const exchangerateEl = document.getElementById("exchange-rate")

    UpdateRate()

    function UpdateRate(){
        fetch(` https://v6.exchangerate-api.com/v6/63e8619e8e1aba9417cb1931/latest/${currencyfirstEl.value}`).then((res)=>res.json()).then((data)=>{
            const rate = data.conversion_rates[currencySecondEl.value]
            exchangerateEl.innerText = `1 ${currencyfirstEl.value} = ${rate} ${currencySecondEl.value}`
            worthsecondEl.value = Math.floor(worthfirstEl.value * rate)
        })
    }

    currencyfirstEl.addEventListener('click', UpdateRate)
    currencySecondEl.addEventListener('click', UpdateRate)
    worthfirstEl.addEventListener('input', UpdateRate)
</script>
</html>
